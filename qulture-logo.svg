<svg width="400" height="320" viewBox="0 0 400 320" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- Purple-Pink Gradient for vulture -->
        <linearGradient id="vultureGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#7C3AED" stop-opacity="1" />
            <stop offset="50%" stop-color="#A855F7" stop-opacity="1" />
            <stop offset="100%" stop-color="#EC4899" stop-opacity="1" />
        </linearGradient>

        <!-- Cyan accent for circuit nodes -->
        <linearGradient id="cyanAccent" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#06B6D4" stop-opacity="1" />
            <stop offset="100%" stop-color="#3B82F6" stop-opacity="1" />
        </linearGradient>

        <!-- Text gradient -->
        <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#06B6D4" stop-opacity="1" />
            <stop offset="25%" stop-color="#A855F7" stop-opacity="1" />
            <stop offset="50%" stop-color="#EC4899" stop-opacity="1" />
            <stop offset="75%" stop-color="#A855F7" stop-opacity="1" />
            <stop offset="100%" stop-color="#7C3AED" stop-opacity="1" />
        </linearGradient>
    </defs>

    <g>
        <!-- Vulture Outline - Elegant profile with distinctive head and beak -->
        <!-- Head with characteristic vulture shape -->
        <path
            d="M 180 60 Q 190 45 210 40 Q 230 38 245 45 L 265 50 Q 275 55 280 65"
            stroke="url(#vultureGradient)"
            stroke-width="6"
            fill="none"
            stroke-linecap="round"
            stroke-linejoin="round"
        />

        <!-- Strong, hooked beak -->
        <path
            d="M 280 65 Q 290 70 295 80 Q 298 88 293 95 L 285 98"
            stroke="url(#vultureGradient)"
            stroke-width="6"
            fill="none"
            stroke-linecap="round"
            stroke-linejoin="round"
        />

        <!-- Back of head connecting to neck -->
        <path
            d="M 180 60 Q 175 70 175 85 Q 173 100 175 115"
            stroke="url(#vultureGradient)"
            stroke-width="6"
            fill="none"
            stroke-linecap="round"
            stroke-linejoin="round"
        />

        <!-- Neck and body -->
        <path
            d="M 175 115 Q 178 140 185 160 Q 190 180 195 200 L 200 240"
            stroke="url(#vultureGradient)"
            stroke-width="6"
            fill="none"
            stroke-linecap="round"
            stroke-linejoin="round"
        />

        <!-- Chest/breast line -->
        <path
            d="M 285 98 Q 275 110 265 125 Q 255 145 250 165 Q 245 185 242 205 L 238 240"
            stroke="url(#vultureGradient)"
            stroke-width="6"
            fill="none"
            stroke-linecap="round"
            stroke-linejoin="round"
        />

        <!-- Wing - elegant arc -->
        <path
            d="M 200 180 Q 160 195 135 220 Q 115 240 105 265 L 100 280"
            stroke="url(#vultureGradient)"
            stroke-width="5"
            fill="none"
            stroke-linecap="round"
        />

        <path
            d="M 190 200 Q 155 210 130 235 Q 110 255 100 280"
            stroke="url(#vultureGradient)"
            stroke-width="5"
            fill="none"
            stroke-linecap="round"
        />

        <path
            d="M 185 220 Q 150 230 125 255 Q 108 272 100 290"
            stroke="url(#vultureGradient)"
            stroke-width="5"
            fill="none"
            stroke-linecap="round"
        />

        <!-- Tail feathers -->
        <path
            d="M 200 240 Q 195 255 192 270 L 188 285"
            stroke="url(#vultureGradient)"
            stroke-width="5"
            fill="none"
            stroke-linecap="round"
        />

        <path
            d="M 210 245 Q 208 260 206 275 L 204 290"
            stroke="url(#vultureGradient)"
            stroke-width="5"
            fill="none"
            stroke-linecap="round"
        />

        <!-- Legs - simple, elegant -->
        <path
            d="M 218 240 L 220 265 M 225 265 L 230 265 M 215 265 L 210 265"
            stroke="url(#vultureGradient)"
            stroke-width="4"
            fill="none"
            stroke-linecap="round"
        />

        <!-- Circuit board pattern inside body - AI/Intelligence theme -->
        <!-- Main circuit trunk -->
        <path
            d="M 200 100 L 200 140 M 200 120 L 215 120 M 200 135 L 225 135"
            stroke="url(#vultureGradient)"
            stroke-width="3"
            fill="none"
            stroke-linecap="round"
        />

        <!-- Branch circuits -->
        <path
            d="M 215 120 L 215 110 M 215 120 L 215 130"
            stroke="url(#vultureGradient)"
            stroke-width="2.5"
            fill="none"
            stroke-linecap="round"
        />

        <path
            d="M 225 135 L 225 145 M 225 135 L 235 135"
            stroke="url(#vultureGradient)"
            stroke-width="2.5"
            fill="none"
            stroke-linecap="round"
        />

        <path
            d="M 200 150 L 210 150 L 210 165 M 200 165 L 220 165"
            stroke="url(#vultureGradient)"
            stroke-width="2.5"
            fill="none"
            stroke-linecap="round"
        />

        <!-- Circuit nodes - cyan accents -->
        <circle cx="200" cy="100" r="5" fill="url(#cyanAccent)" />
        <circle cx="215" cy="110" r="4" fill="url(#cyanAccent)" />
        <circle cx="215" cy="130" r="4" fill="url(#cyanAccent)" />
        <circle cx="225" cy="145" r="4" fill="url(#cyanAccent)" />
        <circle cx="235" cy="135" r="4" fill="url(#cyanAccent)" />
        <circle cx="210" cy="165" r="4" fill="url(#cyanAccent)" />
        <circle cx="220" cy="165" r="4" fill="url(#cyanAccent)" />
        <circle cx="200" cy="140" r="5" fill="url(#cyanAccent)" />

        <!-- Eye - intelligent gaze -->
        <circle cx="245" cy="60" r="3.5" fill="url(#cyanAccent)" />

        <!-- QULTURE text integrated below -->
        <text
            x="200"
            y="305"
            font-size="48"
            font-weight="800"
            fill="url(#textGradient)"
            text-anchor="middle"
            letter-spacing="6"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        >
            QULTURE
        </text>
    </g>
</svg>
